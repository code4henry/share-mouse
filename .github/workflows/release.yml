name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Create the (draft) release first so parallel build jobs can upload to it.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "ShareMouse ${{ github.ref_name }}" \
            --notes "Cross-platform mouse & keyboard sharing app. See assets below." \
            --draft \
            || echo "release may already exist"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS (Apple Silicon)
          - platform: windows-latest
            target: ''
            name: Windows (x64)

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # ── macOS: build, re-sign with a clean ad-hoc signature, rebuild dmg ──
      - name: Build Tauri app (macOS)
        if: matrix.platform == 'macos-latest'
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Re-sign and repackage dmg (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/ShareMouse.app"
          VERSION="${{ github.ref_name }}"

          # Re-sign the whole bundle with a clean ad-hoc signature.
          # Tauri's default ad-hoc signature is inconsistent ("code has no
          # resources but signature indicates they must be present"), which
          # makes macOS report the app as "damaged". Re-signing fixes it.
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict "$APP"

          # Build a fresh drag-to-Applications dmg from the re-signed app.
          STAGING="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          DMG="ShareMouse_${VERSION}_aarch64.dmg"
          hdiutil create -volname ShareMouse -srcfolder "$STAGING" -ov -format UDZO "$DMG"

          gh release upload "$VERSION" "$DMG" --clobber

      # ── Windows: standard build, upload exe + msi ──
      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm run tauri build

      - name: Upload Windows assets
        if: matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}"
          gh release upload $version `
            (Get-Item src-tauri/target/release/bundle/nsis/*.exe) `
            (Get-Item src-tauri/target/release/bundle/msi/*.msi) `
            --clobber
