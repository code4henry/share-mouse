name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            artifact: ShareMouse_aarch64.dmg
            name: macOS (Apple Silicon)
          - platform: windows-latest
            args: ''
            artifact: ShareMouse_0.1.0_x64-setup.exe
            name: Windows (x64)

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ShareMouse ${{ github.ref_name }}'
          releaseBody: |
            Cross-platform mouse & keyboard sharing app.

            ## Downloads
            - **macOS**: `ShareMouse_aarch64.dmg` (Apple Silicon)
            - **Windows**: `ShareMouse_0.1.0_x64-setup.exe` (installer)

            ## Usage
            1. Install on both Mac and Windows (same WiFi network)
            2. On the machine with the physical mouse/keyboard → click **Host**
            3. On the other machine → enter Host IP → click **Connect**
            4. Move cursor to screen edge to switch machines!

            > macOS users: grant Accessibility permission in System Settings → Privacy & Security → Accessibility
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
